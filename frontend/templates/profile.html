<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ Cá nhân - Meeting Minutes AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/js/theme.js"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-header h2 {
            margin: 0 0 0.5rem 0;
        }
        .info-group {
            margin-bottom: 1.5rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .info-group label {
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .info-value {
            font-size: 1.05rem;
            font-weight: 500;
            margin-top: 0.25rem;
        }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <a href="/" style="display: flex; align-items: center; gap: 0.5rem; color: inherit; text-decoration: none;">
                <span>←</span> Quay lại Dashboard
            </a>
        </div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button onclick="toggleTheme()" id="themeToggleBtn" class="btn btn-outline text-sm" style="display: flex; align-items: center;"></button>
            <button onclick="logout()" class="btn btn-secondary text-sm">Đăng xuất</button>
        </div>
    </nav>

    <div class="container profile-container">
        <div class="card">
            <div class="profile-header">
                <h2>👤 Hồ sơ Cá nhân</h2>
                <p class="text-muted text-sm">Quản lý tài khoản và thiết lập bảo mật</p>
            </div>

            <div id="updateAlert" class="alert"></div>

            <div class="info-group">
                <label>Tên đăng nhập (Username)</label>
                <div id="usernameDisplay" class="info-value">Đang tải...</div>
                
                <div style="margin-top: 1rem;">
                    <label>Ngày tham gia</label>
                    <div id="joinDateDisplay" class="info-value">Đang tải...</div>
                </div>

                <div style="margin-top: 1rem;">
                    <label>Chức vụ (Quyền hạn)</label>
                    <div id="rolesDisplay" style="margin-top: 0.5rem;">Đang tải...</div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

            <form onsubmit="updateProfile(event)">
                <h4 style="margin-bottom: 1rem;">📝 Cập nhật thông tin</h4>
                
                <div style="margin-bottom: 1rem;">
                    <label>Tên hiển thị (Tên thật)</label>
                    <input type="text" id="fullNameInput" placeholder="VD: Nguyễn Văn A" style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius); padding: 0.5rem;">
                </div>

                <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed var(--border-color);">
                    <h4 style="margin-bottom: 1rem; color: #b91c1c;">🔐 Đổi mật khẩu</h4>
                    <p class="text-sm text-muted" style="margin-bottom: 1rem;">Bỏ trống nếu bạn không muốn đổi mật khẩu.</p>
                    
                    <div style="margin-bottom: 1rem;">
                        <label>Mật khẩu mới</label>
                        <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới..." style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius); padding: 0.5rem;">
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <label style="color: #b91c1c; font-weight: 500;">Mật khẩu hiện tại *</label>
                        <input type="password" id="currentPassword" placeholder="Yêu cầu phải có để đổi thông tin..." style="width: 100%; border: 1px solid var(--border-color); border-radius: var(--radius); padding: 0.5rem;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                    Lưu thay đổi
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/profile.js"></script>
</body>

</html>
